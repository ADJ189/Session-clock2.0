<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Deep space background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="60%" stop-color="#0d0520"/>
      <stop offset="100%" stop-color="#06030f"/>
    </radialGradient>
    <!-- Emerald glow for clock face -->
    <radialGradient id="faceGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6ee7b7" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6ee7b7" stop-opacity="0"/>
    </radialGradient>
    <!-- Indigo glow for minute hand -->
    <radialGradient id="minuteGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <!-- Hand glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="centerGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Clip to rounded square -->
    <clipPath id="roundClip">
      <rect width="512" height="512" rx="112"/>
    </clipPath>
  </defs>

  <!-- App icon background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>

  <!-- Subtle star field -->
  <g clip-path="url(#roundClip)" opacity="0.5">
    <circle cx="80" cy="90" r="1.2" fill="#fff" opacity="0.6"/>
    <circle cx="140" cy="55" r="0.9" fill="#fff" opacity="0.5"/>
    <circle cx="420" cy="70" r="1.4" fill="#fff" opacity="0.7"/>
    <circle cx="460" cy="130" r="0.8" fill="#fff" opacity="0.4"/>
    <circle cx="390" cy="45" r="1.1" fill="#fff" opacity="0.6"/>
    <circle cx="60" cy="170" r="0.7" fill="#fff" opacity="0.4"/>
    <circle cx="450" cy="410" r="1.2" fill="#fff" opacity="0.5"/>
    <circle cx="70" cy="400" r="0.9" fill="#fff" opacity="0.4"/>
    <circle cx="100" cy="450" r="1.3" fill="#fff" opacity="0.6"/>
    <circle cx="430" cy="460" r="0.8" fill="#fff" opacity="0.4"/>
    <circle cx="200" cy="40" r="0.7" fill="#fff" opacity="0.5"/>
    <circle cx="330" cy="35" r="1.0" fill="#fff" opacity="0.6"/>
  </g>

  <!-- Clock face ambient glow -->
  <circle cx="256" cy="256" r="210" fill="url(#faceGlow)"/>

  <!-- Outer ring — faint track -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="#6ee7b7" stroke-width="1.5" opacity="0.15"/>

  <!-- Progress arc — about 75% session done, stroke-dasharray for a beautiful arc -->
  <!-- 190 * 2π ≈ 1194, 75% of that ≈ 896 -->
  <circle cx="256" cy="256" r="190"
    fill="none"
    stroke="#6ee7b7"
    stroke-width="3"
    stroke-linecap="round"
    stroke-dasharray="896 298"
    stroke-dashoffset="298"
    opacity="0.55"
    transform="rotate(-90 256 256)"/>

  <!-- Inner decorative ring -->
  <circle cx="256" cy="256" r="158" fill="none" stroke="#6ee7b7" stroke-width="1" opacity="0.20"/>

  <!-- Hour tick marks — 12 marks -->
  <g stroke="#6ee7b7" stroke-linecap="round" opacity="0.45">
    <!-- 12 o'clock -->
    <line x1="256" y1="80" x2="256" y2="100" stroke-width="4"/>
    <!-- 1 -->
    <line x1="339.5" y1="96.5" x2="331" y2="110" stroke-width="2.5"/>
    <!-- 2 -->
    <line x1="403" y1="155" x2="392" y2="164" stroke-width="2.5"/>
    <!-- 3 -->
    <line x1="432" y1="256" x2="412" y2="256" stroke-width="4"/>
    <!-- 4 -->
    <line x1="403" y1="357" x2="392" y2="348" stroke-width="2.5"/>
    <!-- 5 -->
    <line x1="339.5" y1="415.5" x2="331" y2="402" stroke-width="2.5"/>
    <!-- 6 -->
    <line x1="256" y1="432" x2="256" y2="412" stroke-width="4"/>
    <!-- 7 -->
    <line x1="172.5" y1="415.5" x2="181" y2="402" stroke-width="2.5"/>
    <!-- 8 -->
    <line x1="109" y1="357" x2="120" y2="348" stroke-width="2.5"/>
    <!-- 9 -->
    <line x1="80" y1="256" x2="100" y2="256" stroke-width="4"/>
    <!-- 10 -->
    <line x1="109" y1="155" x2="120" y2="164" stroke-width="2.5"/>
    <!-- 11 -->
    <line x1="172.5" y1="96.5" x2="181" y2="110" stroke-width="2.5"/>
  </g>

  <!-- Hour hand — pointing ~10 o'clock, with glow -->
  <g filter="url(#glow)">
    <line x1="256" y1="256" x2="176" y2="156"
      stroke="#6ee7b7" stroke-width="9" stroke-linecap="round" opacity="0.95"/>
  </g>

  <!-- Minute hand — pointing ~2 o'clock, with indigo glow -->
  <g filter="url(#glow)">
    <line x1="256" y1="256" x2="346" y2="166"
      stroke="#818cf8" stroke-width="7" stroke-linecap="round" opacity="0.95"/>
  </g>

  <!-- Second hand — thin red accent -->
  <g filter="url(#glow)">
    <line x1="256" y1="296" x2="256" y2="118"
      stroke="#f87171" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
  </g>

  <!-- Center jewel -->
  <circle cx="256" cy="256" r="18" fill="#06030f" filter="url(#centerGlow)"/>
  <circle cx="256" cy="256" r="14" fill="#6ee7b7" opacity="0.9"/>
  <circle cx="256" cy="256" r="8" fill="#06030f"/>
  <circle cx="256" cy="256" r="4" fill="#6ee7b7"/>

  <!-- Glowing dot at progress arc tip (at 75% ≈ -9 degrees from top, going CW) -->
  <circle cx="312" cy="84" r="5" fill="#6ee7b7" opacity="0.9" filter="url(#softGlow)"/>
</svg>
