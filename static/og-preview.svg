<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bgMain" cx="30%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="55%" stop-color="#0d0520"/>
      <stop offset="100%" stop-color="#06030f"/>
    </radialGradient>
    <radialGradient id="clockGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6ee7b7" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#6ee7b7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="heroGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="textGlow" x="-5%" y="-20%" width="110%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="subtleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="60%" stop-color="#a5f3d0"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6ee7b7" stop-opacity="0"/>
      <stop offset="30%" stop-color="#6ee7b7" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#818cf8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgMain)"/>

  <!-- Star field -->
  <g opacity="0.55">
    <circle cx="50" cy="40" r="1.3" fill="#fff" opacity="0.6"/>
    <circle cx="180" cy="80" r="0.9" fill="#fff" opacity="0.4"/>
    <circle cx="320" cy="25" r="1.1" fill="#fff" opacity="0.7"/>
    <circle cx="480" cy="60" r="0.7" fill="#fff" opacity="0.5"/>
    <circle cx="620" cy="35" r="1.4" fill="#fff" opacity="0.6"/>
    <circle cx="780" cy="55" r="0.8" fill="#fff" opacity="0.4"/>
    <circle cx="950" cy="30" r="1.2" fill="#fff" opacity="0.6"/>
    <circle cx="1100" cy="65" r="0.9" fill="#fff" opacity="0.5"/>
    <circle cx="1170" cy="40" r="1.0" fill="#fff" opacity="0.7"/>
    <circle cx="90" cy="580" r="1.1" fill="#fff" opacity="0.5"/>
    <circle cx="250" cy="600" r="0.8" fill="#fff" opacity="0.4"/>
    <circle cx="1080" cy="570" r="1.3" fill="#fff" opacity="0.6"/>
    <circle cx="1150" cy="590" r="0.7" fill="#fff" opacity="0.5"/>
    <circle cx="40" cy="300" r="0.9" fill="#fff" opacity="0.35"/>
    <circle cx="1165" cy="310" r="0.8" fill="#fff" opacity="0.35"/>
    <circle cx="420" cy="590" r="1.0" fill="#fff" opacity="0.5"/>
    <circle cx="800" cy="605" r="0.9" fill="#fff" opacity="0.4"/>
  </g>

  <!-- Hero glow blob behind clock -->
  <ellipse cx="870" cy="315" rx="320" ry="290" fill="url(#heroGlow)"/>

  <!-- === CLOCK (right side) === -->
  <g transform="translate(870, 315)">
    <!-- Face ambient glow -->
    <circle cx="0" cy="0" r="230" fill="url(#clockGlow)"/>

    <!-- Outermost ring -->
    <circle cx="0" cy="0" r="210" fill="none" stroke="#6ee7b7" stroke-width="1.5" opacity="0.12"/>

    <!-- Progress arc ~72% -->
    <!-- 210*2π ≈ 1319, 72% ≈ 950 -->
    <circle cx="0" cy="0" r="210"
      fill="none"
      stroke="#6ee7b7"
      stroke-width="4"
      stroke-linecap="round"
      stroke-dasharray="950 369"
      stroke-dashoffset="369"
      opacity="0.6"
      transform="rotate(-90)"/>

    <!-- Inner ring -->
    <circle cx="0" cy="0" r="175" fill="none" stroke="#6ee7b7" stroke-width="1" opacity="0.18"/>

    <!-- Hour tick marks -->
    <g stroke="#6ee7b7" stroke-linecap="round" opacity="0.4">
      <line x1="0" y1="-210" x2="0" y2="-196" stroke-width="5"/>
      <line x1="105" y1="-181.7" x2="98" y2="-169.7" stroke-width="3"/>
      <line x1="181.7" y1="-105" x2="169.7" y2="-98" stroke-width="3"/>
      <line x1="210" y1="0" x2="196" y2="0" stroke-width="5"/>
      <line x1="181.7" y1="105" x2="169.7" y2="98" stroke-width="3"/>
      <line x1="105" y1="181.7" x2="98" y2="169.7" stroke-width="3"/>
      <line x1="0" y1="210" x2="0" y2="196" stroke-width="5"/>
      <line x1="-105" y1="181.7" x2="-98" y2="169.7" stroke-width="3"/>
      <line x1="-181.7" y1="105" x2="-169.7" y2="98" stroke-width="3"/>
      <line x1="-210" y1="0" x2="-196" y2="0" stroke-width="5"/>
      <line x1="-181.7" y1="-105" x2="-169.7" y2="-98" stroke-width="3"/>
      <line x1="-105" y1="-181.7" x2="-98" y2="-169.7" stroke-width="3"/>
    </g>

    <!-- Hour hand ~10 o'clock -->
    <g filter="url(#glow)">
      <line x1="0" y1="0" x2="-100" y2="-140"
        stroke="#6ee7b7" stroke-width="10" stroke-linecap="round" opacity="0.95"/>
    </g>
    <!-- Minute hand ~2 o'clock -->
    <g filter="url(#glow)">
      <line x1="0" y1="0" x2="130" y2="-130"
        stroke="#818cf8" stroke-width="8" stroke-linecap="round" opacity="0.95"/>
    </g>
    <!-- Second hand -->
    <g filter="url(#glow)">
      <line x1="0" y1="50" x2="0" y2="-165"
        stroke="#f87171" stroke-width="3.5" stroke-linecap="round" opacity="0.85"/>
    </g>

    <!-- Center jewel -->
    <circle cx="0" cy="0" r="20" fill="#06030f"/>
    <circle cx="0" cy="0" r="15" fill="#6ee7b7" opacity="0.9" filter="url(#subtleGlow)"/>
    <circle cx="0" cy="0" r="9" fill="#06030f"/>
    <circle cx="0" cy="0" r="5" fill="#6ee7b7"/>

    <!-- Arc tip dot -->
    <circle cx="95" cy="-186" r="6" fill="#6ee7b7" opacity="0.9" filter="url(#glow)"/>
  </g>

  <!-- === LEFT SIDE TEXT === -->

  <!-- App icon (small) + title row -->
  <!-- Inline mini clock icon -->
  <g transform="translate(100, 155)">
    <circle cx="0" cy="0" r="22" fill="none" stroke="#6ee7b7" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="0" x2="-9" y2="-12" stroke="#6ee7b7" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="11" y2="-10" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="3" fill="#6ee7b7"/>
  </g>

  <!-- Title -->
  <text x="140" y="168" font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="52" font-weight="700" letter-spacing="-1" fill="url(#titleGrad)"
    filter="url(#textGlow)">Session Clock</text>

  <!-- Divider line -->
  <line x1="100" y1="196" x2="680" y2="196" stroke="url(#lineGrad)" stroke-width="1.5"/>

  <!-- Tagline -->
  <text x="100" y="240" font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="22" font-weight="300" fill="#a5f3d0" opacity="0.85" letter-spacing="0.5">
    A cinematic focus timer. Every theme is a world.
  </text>

  <!-- Feature pills -->
  <!-- Pill helper: each is a rounded rect + text -->
  <g font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="500">
    <!-- 63+ Themes -->
    <rect x="100" y="270" width="110" height="30" rx="15" fill="#6ee7b7" fill-opacity="0.12" stroke="#6ee7b7" stroke-width="1" stroke-opacity="0.4"/>
    <text x="155" y="290" fill="#6ee7b7" text-anchor="middle">🎬 63+ Themes</text>

    <!-- Binaural Audio -->
    <rect x="220" y="270" width="130" height="30" rx="15" fill="#818cf8" fill-opacity="0.12" stroke="#818cf8" stroke-width="1" stroke-opacity="0.4"/>
    <text x="285" y="290" fill="#818cf8" text-anchor="middle">🎵 Binaural Audio</text>

    <!-- Pomodoro -->
    <rect x="360" y="270" width="105" height="30" rx="15" fill="#f87171" fill-opacity="0.10" stroke="#f87171" stroke-width="1" stroke-opacity="0.35"/>
    <text x="412" y="290" fill="#f87171" text-anchor="middle">🍅 Pomodoro</text>

    <!-- PWA -->
    <rect x="475" y="270" width="80" height="30" rx="15" fill="#6ee7b7" fill-opacity="0.10" stroke="#6ee7b7" stroke-width="1" stroke-opacity="0.3"/>
    <text x="515" y="290" fill="#6ee7b7" text-anchor="middle">📲 PWA</text>

    <!-- Voice -->
    <rect x="100" y="312" width="90" height="30" rx="15" fill="#818cf8" fill-opacity="0.10" stroke="#818cf8" stroke-width="1" stroke-opacity="0.3"/>
    <text x="145" y="332" fill="#818cf8" text-anchor="middle">🎙 Voice</text>

    <!-- Zen Mode -->
    <rect x="200" y="312" width="100" height="30" rx="15" fill="#6ee7b7" fill-opacity="0.10" stroke="#6ee7b7" stroke-width="1" stroke-opacity="0.3"/>
    <text x="250" y="332" fill="#6ee7b7" text-anchor="middle">🧘 Zen Mode</text>

    <!-- Zero Backend -->
    <rect x="310" y="312" width="122" height="30" rx="15" fill="#4ade80" fill-opacity="0.10" stroke="#4ade80" stroke-width="1" stroke-opacity="0.3"/>
    <text x="371" y="332" fill="#4ade80" text-anchor="middle">🔒 Zero Backend</text>

    <!-- 8 Languages -->
    <rect x="442" y="312" width="115" height="30" rx="15" fill="#818cf8" fill-opacity="0.10" stroke="#818cf8" stroke-width="1" stroke-opacity="0.3"/>
    <text x="500" y="332" fill="#818cf8" text-anchor="middle">🌐 8 Languages</text>
  </g>

  <!-- Stats row -->
  <g font-family="'Helvetica Neue', Arial, sans-serif">
    <text x="100" y="400" font-size="36" font-weight="800" fill="#6ee7b7">63+</text>
    <text x="100" y="422" font-size="13" fill="#6ee7b7" opacity="0.6" font-weight="400">ANIMATED THEMES</text>

    <line x1="168" y1="378" x2="168" y2="428" stroke="#6ee7b7" stroke-width="1" opacity="0.2"/>

    <text x="185" y="400" font-size="36" font-weight="800" fill="#818cf8">25</text>
    <text x="185" y="422" font-size="13" fill="#818cf8" opacity="0.6" font-weight="400">MODULES</text>

    <line x1="245" y1="378" x2="245" y2="428" stroke="#6ee7b7" stroke-width="1" opacity="0.2"/>

    <text x="262" y="400" font-size="36" font-weight="800" fill="#f87171">0</text>
    <text x="262" y="422" font-size="13" fill="#f87171" opacity="0.6" font-weight="400">RUNTIME DEPS</text>

    <line x1="330" y1="378" x2="330" y2="428" stroke="#6ee7b7" stroke-width="1" opacity="0.2"/>

    <text x="347" y="400" font-size="36" font-weight="800" fill="#4ade80">20+</text>
    <text x="347" y="422" font-size="13" fill="#4ade80" opacity="0.6" font-weight="400">EASTER EGGS</text>
  </g>

  <!-- Bottom divider -->
  <line x1="100" y1="462" x2="680" y2="462" stroke="url(#lineGrad)" stroke-width="1" opacity="0.5"/>

  <!-- URL / Credit -->
  <text x="100" y="490" font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="16" fill="#6ee7b7" opacity="0.55" font-weight="400" letter-spacing="1">
    accurate-time.pages.dev  ·  github.com/ADJ189/Accurate-Time-
  </text>

  <!-- Quote -->
  <text x="100" y="520" font-family="Georgia, 'Times New Roman', serif"
    font-size="15" fill="#a5f3d0" opacity="0.4" font-style="italic">
    "Focus is the art of knowing what to ignore."
  </text>
</svg>
